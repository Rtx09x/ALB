name: Windows Startup Regression

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-windows-startup:
    name: Windows startup regression
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run memory monitor regression tests
        run: uv run pytest tests/unit/test_memory_monitor.py

      - name: Smoke import application startup path
        run: uv run python -c "from app.main import create_app; app = create_app(); assert app is not None"
